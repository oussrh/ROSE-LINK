# ROSE Link - Continuous Integration Workflow
# Runs tests, linting, and coverage on every push and pull request

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # Backend Tests with Coverage
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting with Ruff
        working-directory: backend
        run: |
          ruff check . --fix --unsafe-fixes
          ruff check . --output-format=github

      - name: Run type checking with mypy
        working-directory: backend
        continue-on-error: true
        run: |
          mypy . --ignore-missing-imports || echo "::warning::mypy found type errors (non-blocking)"

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # Frontend Tests and Linting
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run ESLint
        working-directory: web
        run: npm run lint

      - name: Run tests with coverage
        working-directory: web
        run: npm run test:coverage

  # Shell Script Linting
  lint-shell:
    name: Shell Script Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          find . -name "*.sh" -type f | xargs shellcheck --severity=error

  # Security Scanning
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run security scan
        working-directory: backend
        run: |
          bandit -r . -ll --exclude ./tests -f json -o bandit-report.json
          bandit -r . -ll --exclude ./tests

  # Build Test
  build-test:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test archive build
        run: |
          # Verify required files exist
          test -f install.sh
          test -f backend/main.py
          test -f web/index.html
          echo "All required files present"

      - name: Create test archive
        run: |
          tar -czvf rose-link-test.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='venv' \
            --exclude='node_modules' \
            backend/ web/ system/ install.sh

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: rose-link-test-build
          path: rose-link-test.tar.gz
          retention-days: 7
