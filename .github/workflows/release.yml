# ROSE Link - Release Workflow
# Creates release artifacts when a version tag is pushed

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Run tests before release
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        run: pytest --cov=. --cov-fail-under=70

  # Build release artifacts
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build archive
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          tar -czvf rose-link-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='venv' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='backend/tests' \
            backend/ web/ system/ install.sh uninstall.sh

      - name: Build Debian package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Create package directory structure
          mkdir -p rose-link_${VERSION}/DEBIAN
          mkdir -p rose-link_${VERSION}/opt/rose-link
          mkdir -p rose-link_${VERSION}/etc/systemd/system

          # Copy files
          cp -r backend rose-link_${VERSION}/opt/rose-link/
          cp -r web rose-link_${VERSION}/opt/rose-link/
          cp -r system rose-link_${VERSION}/opt/rose-link/

          # Create control file
          cat > rose-link_${VERSION}/DEBIAN/control << EOF
          Package: rose-link
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: all
          Maintainer: ROSE Link Team
          Description: VPN Router for Raspberry Pi
           Professional WireGuard VPN router solution with WiFi hotspot,
           modern web interface, and automatic failover.
          EOF

          # Build package
          dpkg-deb --build rose-link_${VERSION}
          mv rose-link_${VERSION}.deb rose-link_${VERSION}_all.deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            rose-link-*.tar.gz
            rose-link_*.deb

  # Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Generate changelog excerpt
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "Extracting changelog for v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ROSE Link v${{ steps.version.outputs.VERSION }}
          body: |
            ## ROSE Link v${{ steps.version.outputs.VERSION }}

            ### Installation

            **Quick Install (recommended):**
            ```bash
            curl -sSL https://raw.githubusercontent.com/oussrh/ROSE-LINK/main/install.sh | sudo bash
            ```

            **Archive Install:**
            ```bash
            tar -xzf rose-link-${{ steps.version.outputs.VERSION }}.tar.gz
            sudo bash install.sh
            ```

            **Debian Package:**
            ```bash
            sudo dpkg -i rose-link_${{ steps.version.outputs.VERSION }}_all.deb
            ```

            See [CHANGELOG.md](https://github.com/oussrh/ROSE-LINK/blob/main/CHANGELOG.md) for full details.
          files: |
            rose-link-*.tar.gz
            rose-link_*.deb
          draft: false
          prerelease: false
